<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/auth.css') }}"
    >
</head>

<body>

    <div class="auth-card">

        <h1>AI Life Delay Optimizer</h1>
        <p>Welcome Back</p>

        <form action="/authenticate" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <br>

        <a href="/signup">
            Create New Account
        </a>

    </div>

</body>

</html>
