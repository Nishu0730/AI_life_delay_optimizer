<!DOCTYPE html>
<html>

<head>
    <title>Sign Up</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/auth.css') }}"
    >
</head>

<body>

<div class="auth-card">

    <h1>AI Life Delay Optimizer</h1>
    <p>Create your account</p>

    <form action="/register" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <a href="/login">
        Already have an account? Login
    </a>

</div>

</body>
</html>
